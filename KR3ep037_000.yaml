body:
  text: 戚雲門先生方案字楚三長涇程子能少腹沖氣從左上逆血即隨氣咳吐時復喉燥唇紅此肝陽左升太過皆回腎陰收攝少權治宜滋養三陰壯水制火但血氣無驟充之理仍從血脫補氣之法人參茯神棗仁熟地山萸肉阿膠芡實女貞子白蓮肉青暘沈荊山久咳失血寒熱似瘧脈弦細自汗過多系營衛兩虛心肺不足之候黃耆白芍桂枝麥冬紫苑橘紅甘草北沙參大棗江邑高方錫令郎金水二臟俱虧不能滋養肝木木燥生火自左脅至胸脘氣逆升騰上泛欲吐交秋冬更甚秋為燥令不能制木反助木之燥也今擬早用保肺和肝晚服養陰納氣之法北沙參麥冬肉旋覆花杜蘇子沙蒺藜牡蠣粉川貝母廣橘紅白芍青鉛晚服丸方用六味加牛膝白芍磁石沉香徽州吳端侯診脈虛滑右大於左兩尺空豁少年陽道不舉溺濁遺精寐多汗泄屬真陰內虧腎虛不固未可徒作相火治也人參茯神棗仁兔絲子蓮肉芡實五味枸杞益智仁夏港夏兩時令郎脈虛數兩關堅鋭陰虛復多火鬱治法心腎宜補肝臟宜疏生地阿膠丹皮牡蠣麥冬川貝夏枯草江邑李希賢久嗽失音漏卮不實金水二臟損傷寢食已不安和滋則礙脾燥則傷肺用保和法北沙參茯神苡仁干百合阿膠款冬花橘紅麥冬枇杷葉大興邢奇功診脈左弦澀右弱肺主出氣腎主納氣咳嗽氣虛陽不下達金不制木木反乘金致身半以上先病浮腫繼以失血治宜滋肝益腎納氣歸元未可徒作相火治也生地炭紫菀牛膝鬱金沉香麥冬杏仁橘紅桑皮江邑趙玉圃風溫初起即發譫妄自汗多臥不發熱而大便結據述脈沉細數促已經半月猶以汗下劫奪焉望向安今診左脈細亂右脈斷續口開目閉唇板舌焦不語失溲頭頂強直手足拘攣種種惡象皆成壞症立法制方殊為棘手至細按胸脅臍下少腹宗筋上凝滯不和時復沖逆此非動氣亦非燥結因思六旬高年津液已枯素多操持怫鬱夏秋省墓強涉高巔觸山嵐時氣越數十日而病發乃陰氣不榮陽邪鬱伏少陰少陽開合不司樞轉不利而清濁升降失度經絡機竅不靈即內經所謂精不能養神柔不能養筋也考古法中陽陷入陰氣血頑鈍每取味中之氣濁藥輕投從陰引陽開之通之清之泄之補以運之都以督之冀其流利轉運關鑰漸通度可斡旋於萬一地黃飲子用羚羊一錢北細辛三分玉竹三錢茯神三錢益元散三錢煎湯代水人參一錢另煎衝入溫服徽州倪瑞周令郎時感濕溫之氣陽明蓄熱發黃非疸症可比也今脈數無神便閉已及二旬腸胃枯燥府氣不通心榮肺衛悉被陽邪劫傷內不守外不固神昏頭汗有之但延久正氣日潰邪火固踞有正邪交脫之虞人參鮮生地大黃汁鮮首烏黑山梔茵陳麥冬瓜蔞川連枳實汁菖蒲汁滑石茂墅墩陸風溫風證脈躁神狂胸腹脹悶身半以下痛難轉側此邪風被火搏擊營分致血氣流行失度妊娠五月際此危險難免胎墮之虞川連黃芩焦梔犀角丹皮甘草玉竹鮮生地馬御天令政失汗過經不解邪熱鬱蒸肺胃致發頤毒險症且以辛涼清解連翹柴胡牛蒡子桔梗元參赤芍花粉馬勃生甘草研石羔末二錢張維貞子邪陷膻中心陽散越矇蔽神明天君不能主持矣天竺黃貝母鬱金竹瀝海浮石元參薑汁姜宇瞻令郎脈左關弦結搏指兩尺微細欲絶齒舌喉閉腹痛吐蛔皆少陰厥陰見症其脈俱循喉嚨而氣至則為齒舌夫腎藏虛水無坐鎮之權斯肉瞤而筋惕矣此時不以回陽為治虛虛之禍將何所底止人參附子肉桂白朮益智仁白芍陳皮乾薑吳萸甘草楊庫典程脈數口甜善食易飢渴飲便數多因過啖肥甘積久釀熱致病發為脾疸子和云消爍萬物莫甚於火脾陰虧邪火亢腎元五液少司而背為之痛脾土主諸陽之本而肢節為之酸也議玉女煎合經義辛香蕩滌陳氣立法玉女煎加人參三錢省頭草八錢煎湯代水吳恂若心脈澀胃脈滑兩尺微胸脅煩悶氣升兀兀鼓動咽喉窒塞多痰嘈雜吞酸汗多面赤心陽虛火上浮肺燥令其膹郁清肅不得下行子和云氣火炎爍而道路不利津液日消擬嘉言清燥湯法桑葉麥冬阿膠牡蠣炒石羔杏仁川貝橘紅枇杷葉沙友林肝為至陰之臟故痛發必交陰分疏肝佐以養陰蓯蓉歸身白芍桃仁金鈴子延胡茯苓廣皮木香徽州方時和耳鳴重聽健忘泄精心腎久屬兩虛食後胃翻欲吐語多即喘促中土亦已大虧近復增咳咽喉不清屬心火刑金脾弱失運宜早用心腎交通補養晚以和中育脾清氣化痰之味佐之早服丸方熟地茯神遠志棗仁枸杞石菖蒲芡實兔絲麥冬益智仁蜜丸冬加羊外腎四具晚服丸方橘紅川貝蓮肉於朮茯苓川連牡蠣沉香藿香梗用枇杷葉湯泛丸玉岐蘇逸美左脈細弦右寸關短滑睪丸漏卮有年腰脊牽引痠痛腎精肝血已自內損今食減咳逆多痰脾肺之陽亦虧先崇土固金後用補益下焦之法煎方人參茯神棗仁麥冬北沙參芡實枸杞百合枇杷葉晚服百花瓊玉膏大生地枸杞子麥冬干百合阿膠款冬花法制熬膏濾清入人參末一兩茯苓末一兩半琥珀末三錢沉香末三錢同煉蜜收貯磁器用綿紙箬葉封固隔湯煮一晝夜再用冷水浸一宿開水服休寧程公賓酒濕釀熱多飲則肝浮胃脹咳血半月脈已弦細皆酒客傷中陽絡損傷致血逆不歸經絡病在肝胃二臟活水蘆根鮮生地汁蘇子丹皮鬱金麥冬山梔射干苡仁張皋木令孫血症脈弦大空豁少年陽亢陰虧血隨氣火升動急宜涼肝滋腎之品以引血歸經絡再商進退治法大生地犀角阿膠麥冬牛膝紫苑蘇子橘紅茜草藕孟瑞占令政頭目眩運空痛脈虛弦無力兩尺微澀此皆木鬱生火風自火出虛風鬱火上乘高巔經云腦為髓海而肝膽之絡又皆絡於腦因平昔精髓內枯肝鬱血燥所致非外感溫散可解法宜滋肝養陰息風降火尤當情懷開暢善自調攝九制首烏茯神遠志甘菊柏子仁白蒺藜元參丹皮活滋石煅研絹包三錢程又恆脈左細澀右虛滑肢節痠疼腿足麻木不仁患偏於右凡男子中年後精血易枯肝風鼓動脾失健運之機濁痰凝聚清陽而胸脘噎塞此偏風血槁之漸也天麻歸身炒牛膝炒半夏雲苓桂枝鮮首烏打汁泡淡乾薑服四劑稍減照方去天麻加木瓜天蟲川芎無錫錢紹堯精以養神柔以養筋元氣損血液不能灌溉諸經痹痛頻作寒熱交爭所謂陽維為病苦寒熱也鹿角霜黃耆當歸白芍桂枝牛膝桑枝尖枸杞鱉甲炙甘草萆薢丸方前方去白芍甘草加虎潛白朮黃土岩戴士周右體痠疼麻木迎風流淚失明是腎肝精血交摜致內風習習鼓動頭目冒昧所謂下虛必盛也六味丸加龜膠紫河車茯神遠志長涇方玉祥診脈弦滑右關獨大頭目眩冒腿股痠痛此風痰鬱滯經絡郁久生火火與風合上凌空竅矇蔽清陽致神不健爽急者先治降火豁痰而風自愈鉤鉤甘菊玉竹半夏橘紅茯苓甘草薄荷菖蒲汁薑汁竹瀝張參可脈數弦滑痰火內滯風邪外觸半夏橘紅茯苓甘草杏仁薄荷蔻仁桔梗滑石城中劉友陸虛風偏中調治兩月手足已能運動誤用薰藥取汗夢泄食減懸擬一方服二三劑復延診視用都氣丸作煎料如飲子煎法又劫奪強汗木燥火炎營血耗君相動則精泄不固矣今交長夏火土司升而煩躁面龐精采外越須預防狂亂變幻不然曷不觀乎仲景太陽條中火迫劫汗亡陽之驚狂起臥不安者乎仿復脈湯意人參桂枝麥冬生地阿膠牡蠣龍骨茯神加薑棗小麥玉竹金器益元散煎服無錫蔣尊之脈左弦數右關滑大善飢肉脫諸藥不應因思風橫脾胃煽灼中土致穀食不能榮長肌肉精力日衰經云二陽之病發心脾其傳為風消可知子病必纍其母藏病必連及府也仿河間法黃耆人參生地牛膝附子川斷茯苓五味石斛玉竹鉤鉤地骨皮枳殼服十劑小效又照前方加羌活防風晚服早服丸藥方人參天冬麥冬續斷生地黃玉竹地骨皮鉤鉤山藥茯苓石斛牛膝蜜丸煎丸藥前後守此法四旬而痊城中劉聲遠夫人右脈微弱左弦細木燥血枯腎陰虛損肝風內動火灼津液氣壅生痰阻塞隧道機關不利項強肢攣筋脈不營神倦流涎語言艱澀內經諸風掉眩皆屬肝木木失水滋母病而纍及乎子也顧質弱病延大傷神氣治本則痰水未清治表則本元耗散風浮所勝治以甘寒中土不傷標本兼施矣玉竹鉤鉤茯神天麻當歸白芍牡蠣炙草又神脈稍清語言略爽痰涎攣痛仍復如前經云肝痹善痛大筋軟短小筋弛張腎痹善脹尻以代踵脊以代頭肝腎血痹筋骨焉能流利仍從前法加減緩調多服為宜早服人參玉竹茯神遠志牡蠣鉤鉤天麻紫石英晚服人乳竹瀝薑汁汁梨桑枝嫩尖汁各一小杯煎膏調入血珀末二錢羚羊角末二錢膽星末二錢同煉蜜二兩熬收厚不拘時開水沖服揚州程大凡陽主動而陰主靜煩勞耗血灼精風自火出則喜飢而消惟靜養百天不致暴中失血為妙人參天冬熟地黃柏知母龜板又冬令失藏肝風內動忽然眩暈心煩腹痞便血蓋五行變動風火煽灼尤甚陽擾乎中脾肝俱失藏聚之功所謂陰絡傷則血溢於下也制首烏柏子仁地榆烏梅木瓜白蒺藜生白芍茯神棗仁又左脈短數較甚於右肢體虛浮倦臥痿弱因去血過多氣亦無附交夏至節前後陰陽升降之大關吉凶由此而系宜加意慎之用逍遙去柴胡薄荷歸脾去木香二方合劑加阿膠龜膠鹿膠原注此診與上未符似訛楊綸宣診脈沉而有力舌焦身汗神昏壯熱發斑晦滯堅滿二便閉結適合傷寒下格邪氣內盛脈反鬱伏之說羌防辛散徒耗其陰於裡症無與也急當治苦以泄之大黃厚朴枳實汁川連山梔仁黃芩犀角尖磨汁鮮生地築塘葉彩生左脈細弱右寸滑大向患腰痛近因風熱客邪襲傷肺絡先議清涼清上桔梗杏仁半夏薄荷桑葉沙參橘紅茯苓甘草程漢平寒熱脅痛脈弦細數系邪郁少陽不清小柴胡加桂枝鬱金赤芍東莊陶風火內郁日久客邪外觸表裡不和寒熱頭痛脅痛解表為先青蒿紫蘇連翹山梔半夏橘紅甘草馬嘶橋陶女病過兩候脈不緩和舌乾鼻鼾上噦下泄非退象也川連黃芩半夏廣皮乾薑炙草竹茹生薑大棗長壽方脈弦浮寒熱頭痛經脈不舒此風熱外客兩陽之象秦艽葛根赤芍廣皮桂枝半夏炙草生薑大棗倪振動脈弦滑右關獨大寒熱似瘧肢體麻木不舒雖外感風熱然中虛向有積痰尤宜兼顧其里清脾飲去柴胡加玉竹鉤鉤常熟王脈數浮弦風傷肺胃之絡杏仁桔梗鬱金蘇梗桑皮川貝防風橘紅張應天徽州喉痛目脹裡熱外寒痰咳濁飲此係伏氣為病名曰風溫過服溫散奪液傷陰致寐中躁擾多煩經云衛氣行陰乃得安寐今少寐即躁顯系陰不交戀而動越也節庵云過時而發病不在表已經汗下亦不在表其忌於辛溫表散可知復脈湯加天冬茯神玉竹鮮生地去麻仁大棗顧村徐九官令政脈細澀少腹脹如覆杯舌燥渴飲躁狂便閉乃心陽火熾藏病連府氣不宣化致手足太陽之府俱熱結也議桃核承氣湯築塘張蔭堂客寒犯胃中氣關乖隔蛔厥則嘔腹痛則瀉病屬厥陰肝藏肝性喜酸蛔以苦下取仲景烏梅丸法合乎厥陰條中下利吐蛔論治烏梅乾薑附子川椒當歸桂枝黃柏人參川連炙草白朮苦酒沖三匙北新橋趙肝脾內傷致病氣血交涸孤陽死陰盡為乾枯之象宗經旨調寒熱之逆冷熱並用進連理湯法人參附子炮姜川連木香汁白朮雲苓當歸炙草鬱金汁顧山周價人侄女脈虛滑數兩尺細微久病羸弱肝腎式微陰不交陽心神不聚胞絡空虛痰火內迷乘虛厥動精識蔽蒙虛中夾實語言失緒早安神志心腎為宜晚滌痰火不失病機方闕泰興李琴先令郎病後虛風柔痙精氣內灼漐漐汗泄乃衛陽失護氣易外浮筋脈不得滋榮而手足振掉神志失其內守而口噤不語所謂精不能養神柔不能養筋也但脈渙無神直視失溲脈症俱系散脫勢已難挽再請高明裁酌生脈散頻灌後谷橋卞楚珍令郎脈澀細數兩尺無神初起咽喉腫痛陰氣下虛陽浮上結近因五火挾痛亢胃乘虛暴中跌僕口噤嘔吐黑血氣機不宣唇燥舌乾古稱肺為水之上源主司五聲腎為關鑰閉藏主司五液水源不清則關門不禁遺溺便泄有由來矣今則痰火祕結於止本氣衰脫於下際此險途難保其無變端也天竺黃川貝麥冬石菖蒲汁烏犀尖細辛竹瀝生薑汁徽友張聲遠努力負重傷中氣結不舒脘痛按之有聲脈左細右弦兩尺空豁因痛久肝脾兩傷氣血痹阻其經遂致水飲溢膜外而為病也且調氣和絡冀病緩再商檳榔汁白芍苡仁鬱金半夏旋覆花紫檀屑絳絹屑又服調氣藥脹痛稍緩但按左脅下氣鳴響仍然不止要皆飲邪外里脾胃不舒所謂最虛之處便是容邪之地外臺茯苓飲加白蠟三錢徽友顧御六關脈弦尺脈弱腰脊痛少腹脹氣從左脅下繞臍攻逆濁陰凝聚下焦見症皆屬肝腎議溫柔通劑當歸白芍肉桂熟地炭鬱金牛膝桃仁大紅花皺妙丸方肉蓯蓉補骨脂歸身牛膝小茴熟地川斷肉桂又脅痛脘悶氣塞不通日晡煩熱小便赤色而脈弦數都因水虧木張肝火上乘脾土交春夏木火升騰前病復來矣暫擬疏泄孫團士病起左脅上及中脘下趨少腹脈弦結歇止此膽陽不舒肝邪用事則氣血痹阻衝突乎其間也宗通則不痛之意當歸香附丹參青皮通草附子茯神新絳青蔥許公安令媳脈數弦芤肝腎真陰內損陰虛陽搏血動下溢淋漓固當滋益腎陰引血歸肝但肝病必然乘脾又當佐以植土又脈緩弱火漸降血自得引歸經但汗多食減色奪此陰虛陽無所附也急宜補氣以通血勿徒見血投涼洋岐徐經云血脫補氣以有形之血不能速生無形之氣所當急固即太僕所謂無陽則陰無以生無陰則陽無以化也今年高體弱陽絡傷而血外溢治病之初但以滋陰降火為事不知周身之血悉統攝於脾脾惡濕而喜燥過服歸地芩連壅於脾胃則中州窒塞升降無由遂成脹滿之候也況元氣素虛平昔思慮多郁肝膽之陽久已不和去冬先患腫毒後即繼以血症血去則脾損而氣愈弱矣今診脈虛弦不和兩關尤大而澀可知起恙因由皆關肝脾兩藏是時急於寒涼止血遂致屈曲之木愈陷於壅塞之土時當春令不復焉有暢茂條達之機急者先治莫過調脾和胃一法則州都運化決瀆宣通而胃氣自能下行脾氣遊溢上可散精於肺以通調水道斯清濁自分上下無不條達中土既和精悍得以四布又何必拘拘於開鬼門潔淨府逐水消腫之驗劑而脹始釋者哉補中益氣湯去黃耆倍人參加茯苓澤瀉薑棗煎云葶李乾一脹久氣日益衰致胸腹臍下漸硬食下便甚雖云脾病善脹要亦肝腎少司攝納使然醫家專事辛燥罔顧下元虛損多其不知量也金匱腎氣丸恬莊程咳逆浮腫脈得弦數宗仲景汗出惡風用越婢湯法越婢加茅朮桑皮細蘇梗大腹皮姜皮又脈緩嗽減風水已退從脾肺兩經調養葶藶子茯苓苡仁廣皮白朮車前子姜皮宋大年令政脾病則九竅不利以至陰之藏不得陽和舒布斯水穀入胃傳送不行清濁混亂遂成腹滿腫脹之病此經旨所謂藏寒生滿病三陰結謂之水也病者胎前即患喘咳産後繼以腫脹經今百日有餘脈來微弱無神在右尤甚可知氣血式微中焦窒塞升降無由州都失職決瀆不宣日居月諸灌入隧道津液脂血浸淫洋溢悉化為水總由中央孤藏無氣不能灌溉四旁以鎮流行則水濕泛濫而難支矣讀病機一十九條所以脹病獨歸脾土蓋脾損不能散精於肺則病於上胃損不能司腎之關鑰則病於上三焦俱病以腎純陰之劑投之求其向愈豈可得乎勉擬東垣脾宜升胃宜降合以回陽不失乎人事之當盡也可真武湯加肉桂顧山李脈弦細左脅亦堅大如盤痰裹氣凝血結此五積症中之肥氣也蒸白朮枳實茯苓厚朴白蔻仁白芥子木香青皮煨生薑施村蔣神色痿弱上下睛明穴黑滯脈浮弦腹痛喜食香味寐則腸鳴此蟲積為患也白朮茯苓廣皮棐子檳榔木香厚朴鬱金丸方去木香厚朴鬱金加雷丸沉香水泛丸方子臣脈沉細腎肝交損陰中之陽內離健運不司食減腹脹乃藏之寒生滿之漸也宜用溫通宣補白朮炭茯苓廣皮肉桂附子熟地炭益智仁炮姜炙草鄒日乾令堂向多痰嗽食下噎塞欲吐胸脘痰悶不舒高年陽氣難復易虧徒理其陰焉中病之肯綮擬肺胃清陽論治所謂離照當空陰霾必散也用大半夏湯加乾薑少許大效半夏白蜜人參乾薑黃載陽胃痛氣逆上引胸脅納食則脹痛猛甚脈遲弦滑此多思鬱結氣陷於土脾不升胃不降致水穀之海壅閉所謂不通則痛耳宜疏木以達之取乎內經勝克治病之旨逍遙散合四磨飲峭岐趙湘遠人身氣血流布經俞脈絡全賴中州施化得以納穀生津考之內外傷辨所以獨取脾胃立論也今診脈弦細而遲脅痛嗽血得自力傷不獨金水交虧緣土衰少生化之權致吞酸脘痛妨於飲食此即東垣所謂戊無火不運而痛斯作宜溫中辛散佐苦甘淡以泄之若徒補下元則太陰之脾藏愈窒矣川朴橘紅炙草北沙參茯苓乾薑木香草蔻仁又痛緩嗽減血止飲食漸加坤土健運已行木火亦能和斂然水弱難以驟補宗繆仲淳脾腎雙補法茯神扁豆沙參蒺藜芡實生地炭麥冬白芍枇杷葉施村蔣獻夫令郎腎為藏精之府木為相火之官真陰虧相火動而夢泄不固所謂精不能養神陽虛陰必走也夫耳者少陰少陽寄竅脈絡所主之地精不守則龍雷不寧上擾乎清空以致耳鳴震動上實下虛法當厚味填陰介類潛陽取經義下病治下之旨紫河車牡蠣大熟地龜膠肉蓯蓉人乳粉菟絲子秋石金櫻膏瑣陽蜜丸開水下徽友程心脈細數徑兩尺微弱乃陰不交陽心君妄動耳鳴失聰夢多遺泄蓋肝陽左升太過由腎母收攝少權耳以填補不元導引靜鎮為主熟地山萸肉山藥茯神遠志麥冬龜膠芡實牡蠣金櫻子磁石蜜丸開水下徽友方久泄必傷肝腎之陽腰痛脈數皆水虧不能制火細生地龜板知母雲苓萆薢甘草梢牡蠣缺實錢維寧脈細弱氣衰力倦淋濁便溺作痛得之勞倦傷中所謂中氣不足溲為之白也歸身白朮益智茯苓澤瀉牛膝萆薢生甘草芡實唐墅王脈數大按之微弦濕熱交蒸脾陽不舒濁陰下陷膀胱致便濁精遺溺痛淡以滲之苦以泄之茯苓澤瀉知母遠志滑石山梔仁菖蒲淡竹葉日茂店徽友程疾走遠行則腎肝損於內冒暑臨深則熱濕蒸於外積久乘虛從外至內交互鬱結注腎成淋著肝為疝致溲濁睪腫痛引少腹慮成疝瘕之纍赤苓延胡茅朮阿膠烏藥川楝子牛膝澤瀉青木香周爾元小便淋瀝精隨溺泄脈至弦數兩尺細澀乃少陰腎藏有虧致太陽府氣不化用滋腎丸方法川連肉桂兔絲子車前子生地杜仲生甘草蔡港李位卿脈症氣結在上中脘阻塞吐涎男子中年後陰氣先虧津不運行聚液成痰閉遏胃陽稍食阻痛欲嘔漉漉有聲老年噎膈之漸旋覆代赭新絳淡姜半夏白蔻雲苓橘紅炙草蘇州楓橋顧脈左澀右滑酒客傷中胃陽痹阻營血內枯燥火易動氣逆胸痞吐痰食入噎塞大便燥結所謂上焦不通則上下脘不行老年陰液已虧怕延關格人參半夏茯苓白蜜麻仁鮮生地活水蘆根陶介如久嗽氣損未有不擾動乎腎者入秋氣而逆善噯肺胃之清陽已漓胸脘刺痛會厭抑塞今則食下阻隔多噫白沫自下泛上臍右動氣築築乃氣傷血槁肺不降腎不納已成痛膈重症宗仲景噫氣不除用旋覆代赭湯法旋覆花代赭石人參甘草半夏乾薑大棗制川附薑汁臨服沖白蜜數匙丸方金匱腎氣丸用生脈散加白蜜湯送下施村徐食下噎塞痛連胸腹脈左搏右平由恚怒傷肝肝厥必乘胃府血不藏聚致嘔吐見血而陽明之大絡亦損所謂陽絡傷則血外溢也用柔劑緩調半夏人參棗仁炙草陳皮竹茹阿膠白蜜生薑大棗泰興張來雍積怒動肝損營亢乃燥氣乘復上噫氣下泄氣由血少藏聚流而不行痹阻厥陰循經之所致喉不利脅痞痛也況脈至右滑左澀澀為肺象滑為陽盛金刑木位膽陽不舒脘中迷痛食減液消有自來矣但今值瘧後餘邪未盡先宜清暑和標再商治本之法麥冬雲苓半夏扁豆橘紅丹皮石斛花粉枇杷葉服三劑後用清燥救肺湯加減又服二劑進歸脾越鞠法無錫嚴藝舫人在氣交法乎天地值長夏火土發泄脾腎兩虧不耐炎暑食減脘悶喉燥音低當流金爍石離能灼物尤宜加意於保真四君子湯合生脈散無錫鄒太和令侄神傷於上精損於下藥力難補其空匱林泉清處心曠神情天真可圖來復芡實建蓮遠志天冬元武板人參蓯蓉茯神熟地江陰北門陸咽喉腫脹氣塞眩冒心煩汗泄食減便溏脈至細小澀數此心脾之虧由肝腎內損致陰心亢逆上凌少陰循經之地歸脾雖當泥於心脾於少陰腎藏有間矣人參茯神歸身白朮紫石英麥冬棗仁益智青鉛一兩太平橋李久淋久帶必傷肝腎之陰致奇脈交損腰脊垂痛維綱不振寒熱交作女科以肝為先天宜柔劑緩調以和八脈人參牡蠣龍骨五味歸身白芍阿膠炙草紫石英鹿角霜江輔臣咳血脈弦此肝血失藏肺氣不降從清陽治法桑葉阿膠紫菀麥冬川貝鬱金杏仁丹皮生苡仁又血脫日久陰氣難以驟復過勞脊膂微痛此因營虛失守致督脈亦傷平旦口苦舌乾脈反見數可知陰液內損則君相之火易以升動也生地茯神棗仁紫菀天冬女貞子阿膠芡實丹皮麥冬枇杷葉鎮江程左脈小弱右寸滑大髫年喘症數載不痊遇勞感寒即發即風痰結於肺底積久竟成窠囊阻塞空竅清肅不令下行矣且肺病善咳咳久未有不傳至三焦者故每交少陽氣分用事喘促更無止息也早用化痰定喘晚用復脈和陰海浮石馬兜鈴杏仁桑皮橘紅川貝紫菀蘇子北沙參枇杷葉晚服復脈湯本鎮沈髫年體弱咳嗽失音陽虛必盜汗陰虛生內熱近因春升發泄風熱乘虛襲入肺絡而咳更無停止宜以清上為先補肺阿膠湯加元參地骨皮茯神棗仁高汝明少腹沖氣上逆從左旋右上攻胸脘刺痛皆腎陰少司收攝肝陽升發橫肆血即隨氣咳吐蓋相火不寧未有不挾君火而擾動欲使氣納歸元仍宜靜藥導引人參熟地阿膠補骨脂萸肉茯苓柿霜秋石滸涇口久嗽脈數食減骨蒸得自産後陰虧蓐勞之漸也地骨皮金石斛百合人參麥冬紫菀當歸桑皮炙草丸方烏雞丸開水下錫雖上山朱性善躁鬱相火易動忽崇朝而諸症交作致潮熱已至四旬舌乾便燥胸痞脹滿堅硬不食此以無形氣病漸成有形結痰所以虛而不受補也滋則助脹燥則傷陰惟丹溪宣補並用既能宣壅復可通津適合此症揆度生地汁川貝母鬱金汁肥知母苦杏仁麥冬汁左牡蠣瓜蔞皮廣陳皮白蔻仁香穀芽王聖清病後失調胃陽窒塞中脘痞結阻隔上焦煩渴善飲二便閉結即內經二陽結謂之消也法當養金生水軟堅消痞俾得清升濁降胃津遊溢於上肺氣通調於下病可內全矣雖然渴而能食必發瘡瘍渴不能飲易成中滿失調久延可慮莫道贈言不詳麥門冬湯合四苓散門村張大風脹滿脈多沉遲然按之有神方為有胃氣也今診得沉細如絲寸關歇止知謀慮傷肝積久延及心脾心病血不流脾病食不化膠滯凝結中脘先成痞塊從微至著暴腹脹大如蠱醫家不明肝喜疏達脾升胃降治法非苦降即溫補致藏府氣血日鈍胃陽困厄無怪乎愈治愈劇也但經百日以來精神日以告匱即進藥餌亦如杯水沃燎原矣姑進參附理中冀穀食漸進再商人參附子於朮炙草鳳凰山朱診脈左弦徑而右細澀氣逆從左上升引胸脘而悶痛食下噎塞高年精血內枯惱怒動肝橫逆中土上凌肺下侵腎致咳嘔便閉清陽不升濁陰不降關格之漸擬緩肝潤燥雙開通其經隧生地阿膠桃仁茯神半夏廣皮鬱金歸身生薑汁蘆根汁大石橋酒濕釀熱味歸於脾氣歸於肺內蘊日久干肺則痰咳喉燥乘脾則食少便溏先從肺胃調治用保和湯茯苓芡實百合胡蓮肉麥冬桑皮烏梅枇杷葉蘇州程逸超操持謀慮怫逆內傷肝藏致脾胃氤氳之氣乾健之陽失司宣化納食艱澀積痰覆溢嘔吐漸成噎膈重症雖高年液槁忌燥然投陰柔潤劑壅濕助痰又窒礙脾陽奪食宜順氣平痰滋液養肝以調其升降而導引之人參炮姜生於術麥冬橘皮炒木瓜炙草雲苓海粉半夏曲白蜜生薑汁程逸超令郎經云怒則氣高陽氣薄厥於上必致神蒙竅蔽且向有厥症包絡之痰易隨氣火上胃胸悶口噤耳聾神憒今發五六日心下痞滿不舒脈微色脫兩顴時顯紅赤乃氣未平而神已耗下虛本實先撥從少陰厥陰兩治人參茯神棗仁麥冬牛膝五味子附子龍齒菖蒲小麥化下紫雪一錢五分王鍾嶽先生方案顧山周敬立令郎痢久不止脈見細數少陰腎虛亡血失精之象也又不能食脾火不化相火侵凌上炎下奪津液告竭故又作渴惟專救欲脫之真陽兼能復返其陰俟一陽來復之期冀轉回生髮之氣則治矣為擬三陰煎及三物桃花湯間服之人參一錢熟地三錢白芍酒炒錢半五味子三分炙草三分當歸炒焦一錢益智淡鹽水泡六分又方赤石脂煅研三兩炮姜二錢上為末用香粳米打糊丸每服三錢參湯送下山東周客少年火盛心腎不交夢多走泄或無夢自遺顴赤脈數全屬陰虛精氣不固玉關不閉相火妄動之故也則宜壯水制之不再動其火自然痊安矣大熟地三錢煅牡蠣蓮鬚龜板炙芡實茯神棗仁沙蒺藜去刺一錢建蓮一錢泰興李家襄太陰厥陰之絡寒氣引痛致項強舌卷語言似乎蹇澀其邪由府及藏氣不外衛血不內營致風之所襲併入於心者沉著於絡無陽以煦之故不條達也當治八脈為病歸全淡附子甘菊遠志肉蓯蓉枸杞鹿角霜各一錢熟地三錢黃六脈弦大搏指足徵平素火必有餘肝強胃盛以內伏之火挾外來之風致口眼喎斜頭目不明清陽之分經絡為之所中也然在上之風乃實邪緩散自出茯苓首烏各二錢黃芩天麻防風川貝蒺藜甘菊殭蠶各一錢江陰三官殿馬腹膨症腹脹甚於少腹按之堅急大便泄小便少脈虛細皆陰寒凝結厥氣在下而單腹膨滿當用溫通之法淡乾薑熟附子烏藥益智車前子各二錢吳萸三分煨木香五分蘇州楓橋姚小腹寬痛呼吸俱甚且上為咳逆皆屬二陰之邪久積於中故耳桂枝五分當歸一錢白芍通草烏藥青皮紫朴各一錢吳萸三分生薑一片汪維敬如夫人肝脾素郁氣血素虧致清濁之混亂窒塞中焦及小腹足膝脈絡不仁食減吞酸乃木來侮土之象寡於畏耳按脈皆微真陽不運陰凝阻遏致膹郁不宣當辛通達下之法復以苦泄脹可減矣吳萸鹽水炒乾薑白蔻半夏枳實廣皮川楝鹽炒蘇梗又大凡脈微腹脹小腹上逆者即經云厥氣在下營衛留上真氣逆上正邪相攻而為脹也況乎産後下焦空乏寒從此入致不行也擬方宣通之法兼溫下元自能釋然徐之才云宣可去壅通可去滯溫可去濕因仿而用之吳萸乾薑益智鹽水炒當歸官桂廣皮故紙鹽水炒於朮丹參神麯丸服三錢參湯送下無錫杜鳳山腎脾久虛水濕下陷致足腫陰囊無縫本屬陽虛非溫通下元不可以復脾中之陽兼復腎中之陽日能雪消春水沖和之致漸可復矣上肉桂淡附子澤瀉茯苓益智仁破故紙神麯白朮木香無錫上山朱大倫咳嗽半載兼之脾不運化金土二藏皆虛可知也所賴本質素足未見其形色盡槁雖虛陽上浮咽燥音啞似覺津液內奪不過一時易退而中土轉運之軸失司所必然也然此時入秋燥令火必傷肺傷土不用事脾土益衰食不化而上泛便則泄咳則燥而內生煩火此又必然也大率治法調金水兩藏抑肝培土以復其元約方之法可附於後雖未必有補天之力方冀奏績於將來川貝麥冬俱半炒茯苓扁豆廣皮白穀芽炒南棗枇杷葉又瓊玉膏加減資生丸無錫上山祝振聲夫人大凡病之來必由於調理失宜風寒起居不節日就耗損而然也始因小産後經則淋漓不斷甚至雜穢今復春夏之交遂崩漏不止下元衰弱可知矣況本質又屬陽虛血無所統散失無度積而不行血必大下而無留戀歸經之日致血與氣兩不維附漸成抽絲引絮日夜無度為之索然夫心主血肝藏血脾統血雖屬衝任所司其源在此今擬上益心脾之陽下滋肝腎之陰隸以澀可固脫勿使病內苦結陽歸其宅可望氣血沖和自能霍然熟地四兩當歸三兩白芍二兩赤石脂煅一兩半鹿角霜芡實海螵蛸酒炒枸杞各一兩黃柏八錢元武板刮淨兩半五味子五錢少夫人三瘧之後中脘痞結氣鬱生痰痛嘔少食兼之經水愆期來時作痛且嘔甚至經逆不調而脈細並澀視其形氣未弱血則有餘而氣太郁色雖紫而有寒乃因血積胞門或凝子宮致衝任不榮經年不孕今取義於震陽也一索而得長男更欲求其虛靈不昧之性使三氣混合自然一舉而得子矣熟地川芎白朮肉桂兔絲歸身白芍艾絨吳萸枸杞川斷香附金匱陶叔和年五十外少腹有缺少腹是二陰所處今少腹若有形質其勢日甚上衝至胃皆由平素胃陽有餘腎陰不足濕熱痰飲日漸下趨遂使陽不通陰升降失職非痃非痹無所定名潛匿其間時或隱現投以溫治則熱涼治則寒究竟下焦之邪不因有形之蓄積始來然耶茯苓瓜蔞霜山查肉半夏飛滑石延胡青木香川楝子白螄螺谷水泛為丸吳載暘小腹痛症二便俱閉小腹形如覆杯手不可按濁氣上逆則煩悶不舒暴怒趨急漸至如此膀胱氣不化行精液復傷脂腴凝滯閉塞下元宜通達氣血之滯瘀散脹消二便始快矣川連五錢牛膝二錢鬱金木通枳殼各一錢車前桃仁錢半韭汁一小杯調琥珀末二錢又脈象略和少腹痛處高突亦平但交陰氣衝乃濁陰之邪上干犯胃尚宜滲利以清肅上焦茯苓澤瀉廣皮川連山梔知母麥冬石斛江城東門外張腹脹症少腹有形似疝非疝汨汨有聲此寒濕結於膀胱之絡非溫不通肉桂吳萸乾薑小茴香附白朮茯苓川附半夏蘇載輿令政咳血泄瀉症夫人之症由肝及脾由脾及肺致左脅呼吸引痛中脘嘈雜嘔吞酸水甚至脾虛上泛面目色黃燥咳動絡血隨上溢三者之恙總不離乎燥火內伏氣逆上膈故肝邪犯胃且肺之清肅失司不能平木肝氣上湧無制變生不測今和脾胃滋肝木俾氣火之燥逆漸平再商後治枇杷葉冬桑皮丹皮天冬穀芽白芍生鱉甲穭豆衣又大凡陰虛則火亢內劫其津液致咳無痰又復脾虛大便多泄元氣津液亦從下走且肝之燥逆橫格於中上凌肺下侵脾以致咳瀉不止因思古人云肝苦急急食甘以緩之又云治肝必先實脾況脾為肺之母萬物賴土以生今擬養脾保肺和肝不燥不滋固本為先庶幾有合於病情麥冬茯苓白芍炒人參扁豆炒穀芽北沙參南棗殷家莊朱坤官時感症乾隆甲申五月初三日身熱十餘日頭有汗而熱不解口苦耳聾自利不止即此已為上厥下奪之症前醫所用辛涼達表不應今細按脈皆浮弦舌苔白滑氣弱神倦治法宜從一表一里和之用柴苓法俾兩陽之邪自然解散矣茯苓三錢柴胡淡芩豬苓澤瀉半夏各一錢桂枝五分葛根二錢生薑初六脈浮弦略減自利稀少里邪欲和反惡寒者表邪亦欲和也身熱漐漐汗出口渴有轉退少陽之象用溫膽法以清餘熱半夏茯苓甘草枳實花粉黃芩廣皮竹茹馬脈數細少神瘟毒之邪鬱而未散一身斑疹隱然症非輕候鎊犀角赤芍豆豉各二錢葛根一錢連翹山梔各錢半貫衆去泥蘆根各一兩大力子生研滑石各三錢茅根五錢第三日方荊芥赤芍牛蒡元參小生地乾葛貫衆蘆根第五日方左脈微而無神甚屬可慮右脈數實十餘日不大解頗有下證但煩躁不寧未敢輕下且以竹葉門冬飲止其煩亂為第一竹心五分川連五分麥冬三錢茯神三錢鮮生地打汁五錢犀角一錢半甘草三分知母一錢燈心三尺第七日方少陰之為病但欲寐躁不得臥者不治舌卷或唇焦不大便脈微欲絶用苦辛入腎救逆阿膠二錢川連五分大生地五錢雞子黃三枚天冬一錢犀角尖一錢第二劑症稍減去犀角加當歸一錢麻仁炒研三錢白蜜三匙調服第九日方焦穀芽麥冬茯神石斛小生地阿膠丹皮地骨皮十一日方大生地五錢犀角錢半元參丹皮山梔仁黃芩各一錢茅根五錢十三日方諸症悉退餘熱未盡大原生切片水浸打爛絞汁入煎五錢麥冬穀芽炒石斛各三錢川貝知母元參各一錢竹心五分燈心三尺程載光時感症冬溫邪伏起於吐瀉之後致中氣不和熱不減神昏譫語口渴噁心苔白厚左脅呼吸不利肺氣不清時咳總之熱邪為害按脈浮大且無汗邪尚在經未入乎府宜先理陽明邪散乃愈廣皮半夏雲苓查肉杏仁石羔豆豉蘆根二診脈浮大而數因得微汗勢已略減外熱稍清舌苔黃黑乾燥大便有轉矢氣結燥未下胃不和前方再為加減此時裡熱重於表矣廣皮茯苓半夏滑石杏仁石羔前胡生查肉三診脈症俱減裡熱未盡胃不和大便未通小便赤色再用通利下焦以生津液茯苓滑石瓜蔞皮淡芩澤瀉生查肉生穀芽晚齒痛用清胃散一劑四診脈象略減熱亦稍清此係餘邪不足慮憔左脅痛處大如手掌部位乃肺之經絡痛且拒按系積傷氣血非細故也用和傷之法川連桃仁滑石瓜蔞皮牛膝紅花骨碎補柏子仁七診當歸川芎桃仁骨碎補三七丹皮鬱金瓜蔞劉寄奴桑枝八診生地紫苑川貝地骨皮桑皮丹皮麥冬花粉生蘇子九診脅痛少減時復寒熱痛處發出白疹隱現不定此係從前留滯之餘邪因虛不能外達所幸日飲糜粥藉穀氣漸充而見忌用升提只宜和胃養陰為法炙鱉甲茯苓丹皮川石斛小生地廣皮製半夏貢一帆先生方案本鎮某食物化精胃火盛津液蒸變濁痰逆阻氣道清肅之令不行膈悶吐酸痰多咽噎不利見症在上部宜甘寒清降活水蘆根五錢全瓜蔞打碎三錢甘草三分水飛滑石三錢橘紅錢半枇杷葉錢半陳爾畢請葉天士先生看過不效乾隆五年六月行血無瘀通則復痛病起於憂思鬱結症屬氣分非干陰血瘀凝由脾胃之陽郁遏四肢故為厥冷陽不降陰上逆暮夜則痛乃胸痹之沉錮仲景每使辛溫之藥開通郁遏之陽仿以為法瓜蔞薤白半夏白酒黃遇春頭痛症遇兄之症至今念載據述發時必先不寐而後頭痛發熱診得脈左細弱右弦大乃陰虛陽盛衛氣不得下行之故從陰引陽治法製半夏竹瀝拌炒三錢秫米炒五錢甘草五分夏枯草一兩孫御千先生方案先生自記原本丁亥正月二日夏萬隆子傅生年七歲臥床月餘身如燔炭無汗乾咳不食兒科屢治病益增因請豫視之病熱日久無汗肌肉瘦削捫之熱愈熾近復增乾咳不食納穀無味腹痛按之虛軟診脈左小右大而皆數此肝胃之熱己深晝靜夜劇漸積為蟲有自來矣再以去冬亢旱風燥之邪乘虛上受於肺咳頻而愈增其因耳用內外兼治法鮮地骨皮丹皮玉竹甘草花粉蘆根甘蔗汁一杯沖服四劑後熱退汗出食進繼用肥兒丸一料大效丁亥清明前三日豫至洋岐徐葆中姨丈處其兄潮音女適無錫北門內楊蒻霖者病甚篤拉豫往視因述其概瘕聚少腹偏左有形發亦從左升至胃脘纍纍然滿腹便溺為之阻塞頃之腹中氣喧脹消仍歸少腹醫有平肝若左金之屬溫補者腎氣之屬論奇脈辛香苦溫之屬寒熱雜投歷治三載日夜發作愈劇今交春分節後寒熱大作望之面如渥丹而仍灑浙惡寒骨似蒸蘇究則上熱下冷況兼頭汗淋漓氣怯神倦種種虛候所共睹矣從前脈象據云細弱今左弦而右大中虛無神陰陽有離脫之兆可懼之甚所幸經水屆期不爽生生未絶大凡此症雖由肝鬱起見目今病久體虛下焦脈海乏氣絡虛氣阻易於聚結耳今以峻補之劑培其陰陽根本斂其陽光下潛仍不離通絡之結也人參鹿茸北五味熟地紫石英阿膠當歸小茴香牡蠣丁亥六月侄患痢極重治療月餘已愈然不能戒口戒氣復發延至閏七月二十日外日沒時人事昏沉更定後方蘇余診脈細弱無神右關為最腹如仰瓦臍右動氣大如雞卵震躍不息中虛已極生氣索然投以建中法次日病勢不減延姜體乾診之案云久痢亡陰以致肉削形奪神迷如厥申酉屬陽明時分腸胃津液久虧故現症若是姑以養陰清燥之法治之真阿膠大沙參生白芍炙甘草冬桑葉天門冬生白扁豆二劑後下午神思不昏再請戚向書姜體乾同診之向書案云痢下腸垢五十餘日猶腹痛抽掣惟悴尪羸殆甚几几欲脫矣雖胃口有滯勢難消導急救其陰以戀其陽倣佛復脈湯之意天冬麥冬生地阿膠麻仁炙草白芍南沙參藥無過煎三五十沸即服取義乎濁藥輕投也八月初六日臍旁動氣已平腹亦漸厚痢減腹不掣痛惟所下黏中有白點不已衆皆望其向愈矣豫與姜戚再診之案云診左脈弱右較有神連進復脈湯中宮柔和而神亂煩躁俱止有津回液轉之機此時不問其虛安問其餘大生地麥冬生扁豆炙草大沙參清阿膠白芍大白藕片五錢井水煎五十沸服自此之後又服消積去滯丸藥緩攻一法餘症俱減而痢終不止家貧不能服參胃中邪火燔灼日啖羊肉厚味斤許方快凡除中能食大約不過數日此竟有月餘不輟但利不上身亦不能轉側面浮足腫脈息俱絶又延二三日方死亦事之罕見者是役也雖未收功醫法另出一種亦堪傳也浦景文暑症治驗丁亥七月浦景文患暑症愈而復發壯熱不退醫者先發散繼則重用犀羚連石等藥連服數劑身熱漸退舌苔反煤黑兩脈沉而數細手指牽掣不停眼目定人事一毫不省以手拍額上微有醒意豫曰此虛邪未清寒藥遏之太過邪已舍於神明之室頃刻難支正治方法已不能施速以奇法治之為訂一方鉤鉤絲瓜花竹心鮮石菖蒲鮮荷葉扁豆花薄荷頭竹瀝一杯另取淨水一杯碾入犀黃五釐即以煎劑調服服後神思頓清二劑後舌上黑苔脫落即能言語惟兩目赤翳遮滿視物一毫不見家人咸以目損為懼豫曰無妨此陰虛也須以大劑補陰藥兼粥食並進五六日翳退目明調理一月方能起床毛禹謨時疫症丁亥五月長涇鎮毛禹謨患時症本鎮醫家以三陽經藥發表苦寒藥清火雜治自余汗後熱不衰神昏默沉遍身似斑非斑時復躁擾狂越譫語片晌方定胸腹按之痞滿咽噎多痰舌苔色白中央黃診脈皆數大此時行疫邪橫連募原不易解散遵吳又可法用達原飲疏利之檳榔厚朴芍藥草果仁知母黃芩甘草二劑後症減二三但暫時有如狂之狀欲毆人大便閉結於前方中加生大黃三錢利之所謂三消飲也其病遂不勞餘力而愈矣王仲良陽虛症丁亥冬至前王仲良患傷寒宋朝宗用羌活沖和湯二劑不效戚向書診之身熱脈沉而頭不痛曰此少陰症須服麻黃附子細辛湯發表溫經連進三服亦無效蓋因其人生意操勞過甚又多外寵胃中有寒濕宿病蟄藏與乾健之陽素已衰微不振直宜少陰附子湯法細辛麻黃過於外散尚非法也次日再診其父纘臣初不為意向書曰脈中神情來往不續病難收功舉家驚惶無措請體乾曰事雖急速進大劑參附猶可挽回用附子五錢人參二錢日夜各一服不效且神思散漫口中白沫勃勃上泛進吳茱萸湯又不效再擬方人參四錢附子五錢五味龍骨牡蠣益智仁連進二劑脈象或斷或續竟無寸功招豫同王履安姜體乾戚向書四人共商議用黑錫丹碾化參湯調服白沫始下少頃復上再服又止矣煎劑仍以前方頻服無可更改日夜服參三四錢兩日後脈象來復有向安之兆伊新親唐叔文竟邀陳杏三來看用六君子湯加減一劑次日脈右尺又斷續左關微弱如絲涎沫又上危症復見仍守前法二日脈續涎沫可咽而疲倦不堪反甚於病重時矣此後症屢增屢退計服黑錫丹九錢人參三兩餘後改用八味從陰戀陽膏子以平調上下立春前始能起身猶腹痛脹悶進真武湯而泄瀉脹寬再以參劑調補平安是症也賴有向書之先識體乾之主持二人之功居多而豫與履安商酌贊襄他人不能生別議方克起一生於九死為無功之功也季二世兄諧禹贅於趙室伊妻六小姐年十七患利極重乃翁韶度乘請入城時戊子七月十九也利已五六日始純紅繼白色相雜今下純白黏膩晝夜四五十行後重窘迫多在腰尻尾閭之間少腹不過微痛胃口不能納食閲前方並未解用硝黃重劑增劇外邪暑熱凝結下焦無從解散先通其壅川連生薑秦艽枳殼木香汁檳榔汁查肉神麯桔梗荷葉陳倉米煎湯服一劑次日墜痛少減腹中喧響矢氣甚臭滯未盡而有糞色赤且喜知飢納粥書謂下痢氣者當利其小便急開支河以通之滑石茯苓甘草川連青皮扁豆花廣皮荷葉阿膠白芍初二日早診痢已減半穀食漸增而安寢脈皆和緩右尺獨徑大不平濁邪陷於大腸之分未清擬將欲降之必先升之之法羌活升麻醋炒柴胡醋炒滑石甘草防風根茯苓廣皮查肉檳榔荷葉炒南沙參陳米煎湯晚進末藥一服地榆銀花木香查肉麥芽茯苓廣皮甘草以腸胃病必滓質有形宜散不宜湯也初三日痢止便溏肌潤澤有汗神思清爽穀食頓加脈細弱而數痢後陰虧宜和阿膠白芍炙草扁豆建蓮砂仁廣皮茯苓按戊子少陰君火主氣小滿後三之氣正屬司天客氣亦屬君火加臨二火盤於太虛風自火出日日大風亢旱自春至秋逢風息之日即炎蒸異常立秋之後上自湖廣下至江浙皆患疫痢色赤或五色相雜虛者受之不必噤口而入藏肢冷五六日告斃矣輕者由赤轉白乃愈瘧疾絶少夫火盛之年木能生土旺胃因木火同性肝膽肆橫挹取胃中津液腸胃中被竊空虛暑毒乘虛內襲故患痢者多瘧疾乃少陽經病木旺邪不入故少治痢之法用往年敗毒散芍藥湯香連瀉心等法俱不效因肝為剛藏宜制以柔阿膠白芍胃屬陽土喜通惡塞人參茯苓炙草陳倉米因所傷在胃與脾無與也荷葉升清廣皮利氣銀花清少陰君火而解毒腸中壅滯少加檳榔汁本年治痢之藥如此趙羹和令堂汪氏暑症戊子六月趙羹和令堂因兩孫布痘而夭其一勞碌悲傷之後驟發寒熱嘔吐頭痛汗多腹中脹悶二便不快城中醫者先用小柴胡湯後因其胸悶噁心加入草豆蔻之辛溫遂困苦不堪乃招豫治診左脈不弦而小弱右洪大頭偏右痛抽掣入巔目白赤時泛噁心交申酉時則寒微熱甚口雖渴脘痞不能飲湯苔白汗出淋漓似有昏厥之象余曰此非少陽瘧症乃暑邪由肺入胃暑必兼濕而作壅阻彌浸三焦氣分若延入營中須防變幻遵河間法用宣明甘露飲一劑症減半二劑寒熱止改用人參麥冬甘草竹葉半夏茯苓五味粳米霍然祝肇文夫人痙症祝肇文之妻王巷徐東旭孫女也四月歸家患時症發斑太叔嶽宗聖知醫調治先用荊防風梔豉繼進犀羚膏連生地諸涼劑二候不退肇文作札致施兄登士請豫往視至巳二鼓矣進診面光亮目赤神思瞶瞶手頻欲縮去舌赤齒燥問之微微有聲余知其痙厥將至曰今已更深且不服藥明早進視已口噤目定齘齒兩手牽搐不定身僵無汗面赤如妝脈弦大搏如指數右洪大剛痙之症悉具此邪未發泄涼劑遏之太多耳為用葛根花粉白芷防風殭蠶犀角羚羊角牛黃蚌水鉤鉤竹瀝宣達陽明經分之邪祛痰開竅以息內風相火服一劑至夜半得汗遂蘇天明豫欲歸時復又微厥肇文甚恐豫曰無妨再服一劑自然減可至第二日到彼診脈數小而不能鼓指虛汗津液已現虛象即用生地麥冬阿膠白芍炙草玉竹牡蠣茯神令服三劑登士見方疑補太驟豫以病久體虛液虧為慮決不復痙竟加棗仁當歸補其營陰而安侄倩趙元復腰腿痛症己丑八月中先寒戰一日大汗熱退左半身痛腰胯更甚足不能伸口渴面赤溺混濁短澀平昔脈象六陰今覺數大豫思本年春夏雨霪過多酒客素多內濕為訂一方五苓散加滑石桃仁通陽利濕以疏下部血中之滯服二劑左半上下之痛俱減稍能起坐但腰痛連胯膝屈不伸行走傴僂苦楚思嘉言先生治腰僂廢瘀血內痹者用桃仁承氣加肉桂此邪尚在經絡宗其意立方苡仁桃仁牛膝各三錢肉桂五分大黃錢半地龍九條胭脂綿一錢麝香一分炒黑豆煎湯服四劑症又輕減大便通快稍有血下左足尚短一寸不能直每三四更腹痛竟夜不寐此時豫雖知為血病不知內蓄甚多用活絡丹三服又想少陽主骨太陽主筋用二經之藥羚羊角散一方症不少減但口渴不欲飲必極滾方快時九月天氣尚熱厚褥不嫌熱元復曰余向喜熱畏冷今服附子而病如此真虛寒矣余細思良久悟曰腹痛夜甚臥重褥不欲飲喜滾湯乃血滯之候非寒也下之為宜方用白蒺藜茺蔚子丹皮赤芍炒滑石牛膝歸尾鬱金服四劑連下紫血塊六七回腰胯之痛冰釋膝筋亦伸步履如常矣是役也治法雖活絡丹羚羊角散尚屬隔膜不當余尚切病得效其施侄新學針灸意欲針之豫勸其勿針其四兄怫然曰此病無用針之理乎豫曰針固甚妙但無神針耳嘻難言矣太平橋季七翁令政痢疾症戊子七月十六日季七翁乃室患痢極重招豫與姜體乾診視豫約體乾同去是日豫先至痢已半月五色相雜始事者令君族侄祝冀堂為梁溪著名士因症由脾瀉轉痢為脾傳腎之藏病藥用乾薑白朮赤石脂龍骨蘄艾人參等一派辛溫燥澀之藥但反佐川連烏梅病熱日重飲食已減面色晦滯精神困頓已極診脈細澀不和右尺激之時又鼓指手溫足冷又時微熱舌苔白心中煩腹痛後重如初豫意此非藏病下利究為暑濕內郁腸胃初未外達又未內消邪未去而陰已耗液已虧矣擬和陰潤燥之劑阿膠白芍炙草扁豆炒銀花茯苓沙參荷葉丹皮陳倉米湯煎是夜只痢三次煩痛亦減但神倦似睡汗微欲出舉家咸喜病減又疑欲脫十七日早體乾至同進診脈象虛澀未刻交白露節正氣當倍人參阿膠白芍炙草扁豆花川連薑汁炒荷葉梗神麯廣皮陳倉米湯煎服一時許即索粥飯吃神思稍清而能安臥惟痔痛小便澀少口中乾燥飲以麥冬湯一次至夜小便二次痢竟止矣十八日前方去川連神麯扁豆花加麥冬小麥以養心調理令服四劑飯後同體乾歸述章興官厥症一則甲辰十一月章南山次子興官忽患頭痛面色青黑晦滯畏寒神倦兼有痰嗽曾服息風和陽疏解之藥數劑身發微疹頭痛旋止神識日呆耳聾無汗溺少大便不解越三日適交冬至節候暮夜昏譫而遺溲伊兄洪遠邀豫診視其脈浮而帶弦重按空虛驗其舌上無苔不飢不渴但有疼痛聲而不知其處詢其病之所苦而又不能鳴其狀目視瞑而神呆豫駭曰此症漸入厥象也變幻最多此時尚在遊移未定之際極難圖治必須邀同姜乾干酌議方可主持奈又往錫未歸不獲已勉擬降厥豁痰開竅育陰息風方法挽之服後至夜頗安並且得汗身涼清晨復診按其脈虛象忽退豫令彼將此藥再服一劑是日體翁適歸又邀為之診視就豫方略為加減更進一劑耳聾忽聞症反變出多言無緒似昏非昏似清非清脈變不調之象舌色忽紫中見微黑碎裂之紋如蠶豆瓣大大便久閉小便一晝夜不解體翁悉審視良久曰此症因腎虛邪湊致在下之風火上干而脫其志心虛邪混致在上之痰厥氣不降而失其神況頭疼起見顯系木失水涵肝風挾溫邪而上冒風火煽爍不已肝腎失疏泄閉藏之權而魂志日離邪陽挾相火衝突使津液成痰而亂其神明之主則神不守舍矣雖然溫症變厥治亦何難獨不若此症之不歸經絡不歸腸胃而竊踞於神志之間如油入面打成一局安居於難分難解之地冥頑不靈所以現出狂言失志之狀經云狂言者是失志失志者死遍考方書前而仲景之傷寒後而河間之溫熱從無成法可求應歸不治之例但念與病者嫡表弟兄雖死亦須圖治莫若以靈治靈之法望其或成為尸厥或變為發狂其陰其陽歸正其候乃可斡旋於萬一亦未可知生死關頭惟此一舉而已因與豫同擬一方真赤苓一錢鮮生地洗二錢羚羊角鎊七分生虎骨五分生龍齒一錢云茯神去木二錢川貝母七分炙甘草五分遠志肉炒三分製附子三分麥冬錢半阿膠蛤粉炒一錢小麥二錢玉竹二錢歸身七分廣皮七分犀角五分白薇五分防風四分牛黃調入五釐石菖蒲根二分竹瀝二十匙生薑汁衝入二匙服此藥後至夜忽作痙狀口噤多汗手足強痰涎滿口不能言語至上午時候同體翁診視其脈弦急舌苔轉為白色湯水與之能咽不興則不知體翁曰此正尸厥之象也乃照前方去犀角川貝加入鉤鉤錢半川石斛真天蟲半夏各一錢木瓜七分膽星末調入訶子肉炒各五分石菖蒲汁五匙龍齒減五分遠志薑汁炒加至五分附子加五分竹瀝加至半酒杯薑汁加至五匙牛黃加至一分服此藥後至夜半忽發狂天明覆診其脈弦大而數譫語狂妄體翁曰症轉陽分已見發狂可無慮也羚羊角鮮生地赤茯苓上阿膠蛤粉拌炒淨鉤鉤各錢半淨天冬三錢云茯神三錢川石斛玉竹各二錢遠志薑汁炒廣皮炙草炒大黃木瓜各五分犀角汁衝入膽星末調入防風各三分真天蟲洗炒麥冬白薇各一錢牛黃調下一分小麥二錢生鐵打碎一兩生薑汁下衝三匙石菖蒲汁衝下半酒杯服此藥後至夜能寐狂言少減仍照前方去生鐵鮮生地減用一錢牛黃減用半分炒大黃減用三分犀角汁減用二分金器一件苡仁酒炒錢半炒白芍八分當歸身五分自服此後狂越漸平寢食得安不藥而愈豫因此症變幻非常體翁議論卓立出口皆應故能用藥靈妙信手而驗誰謂醫家無斡旋造化之功那詳記其治以為來者用法之一助戚金泉先生方案施港王弱脈神虛肢振鼓栗暑風內郁藥以寒涼雜進病日益甚體日益虛以致神識漸有昏沉之纍瘁姑以枇杷葉散挽之枇杷葉公丁香茅根木瓜香薷麥冬厚朴炙草陳皮十九日再診脈頗有神鼓栗已減七八舌苔尚白胃陽為寒苦大傷畏風多汗以建中先立中宮之墓十餘日不大便此胃氣不下行必得健陽中運化物自通無庸攻伐生白芍二錢桂枝木一錢炙草一錢大棗三錢炮姜五分黃精二錢枸杞子一錢井水二碗濾去渣加入飴糖五錢再煎至半碗服二十七日三診左寸關脈浮弦而虛右浮大按之無神舌苔白滑鼻與環口氣色青黑面微浮身仍發熱鼻多汗頭痛煩悶不止心加飢食下則眠睡中土陽和之氣不運風木厥動水穀與風暑鬱而變幻不一病根實深未可輕視仍從初診靜順湯法冀其中旺木和牛膝酒拌木瓜雲苓製附子各五分炮姜防風訶子炙甘草各三分半上村朱女咽喉哇塞吞咽如有物礙是為炙臠肝氣鬱結所致非清涼可解宗仲景辛散開結之法用半夏厚朴湯製半夏製厚朴真紫蘇赤茯苓生薑章春夏陽升忽然面目虛浮畏寒喘息漸漸肢脹其為風水何疑進分消五皮等法皆疏里而不及表徒增洶湧之勢今膚光亮邪無去路且以小青龍湯開其膀胱麻黃桂枝乾薑杏仁細辛滑石苡仁發汗後腫勢大減喘息漸平但脈微神倦恍惚驚惕此水去而封蟄不固也以真武鎮之方用真武湯服數劑後即以此作丸料梅里邵七月二十七日脈左澀結關芤右亦澀弱失血十幾年矣今怒動肝傷氣逆上溢精遺龍雷不寧甚至無夢自泄此陽虛陰必走也當處𭶟陽發泄之候尤貴調平氣分恰與仲淳三要宜降氣不宜降火符合青鉛柏葉艾葉線魚膠蔗節荷葉加八味丸三錢紅絹包煎又初一日大暑之第七日也連進濟生八味丸兩服而血色遂稀精不復遺五內之病情亦可略見矣切其脈亦似前日較勝少澀結之形有鼓蕩之致若云不能斂氣凝神畢竟氤氳之氣與乾健之陽總未必反失沖和也嘗考陽虛之治有二一理中脾宜升也一攝下腎主納也今是龍雷不肯潛伏於收藏之地反升清陽之所故必引之導之咸以潤之介以潛之在此調攝勿懈庶幾病魔可卻龜板蓯蓉牛膝杞子青鉛線膠蔗節送八味丸三錢壬辰秋分夜半起今已四月發熱左胸脅痛難以轉側咳吐自汗無頭痛身痛惡寒等症舌無苔大小便自可腹中和口渴不欲飲先悲泣而後能嗽咳出痰有穢氣毛際脹痛不可近脈弦大而數目微赤面色滯多叫呼與內經悲哀動中則傷魂正合今正值四氣風木濕土令退五氣君火燥金加臨遇悲哀抑鬱之境用甘麥大棗清燥救肺枇杷葉散靜順四湯意冬桑葉淨枇杷葉飛滑石二錢杏仁錢半南沙參炙草五分麥冬肉錢半瓜蔞皮一錢麻仁小麥三錢南棗二枚茅根二錢木瓜三分丁香一分厚朴五分杞子五分牛膝五分雲苓五分葉德培先生方案陽明瘀熱發黃胸膈拒按脅肋脹滿陷胸湯深為切當再加以滲濕利濁之味服之一劑可也發黃一人年將五十身體肥健素患腸風下血已十餘載矣去冬因思慮憂鬱忽然下血數斗後又下如塵水或如豬脂狀延至今春所納之食汨汨下行不得停留變化甚至直出如箭以致肛門脫出數寸每以熱湯浴之睜叫托入頃之去後其肛復脫一晝夜下痢二十餘行苦不可言面色浮腫夭然不澤唇焦口乾鼻孔煤黑右寸浮大重按無力脾脈軟弱痢昨服一劑藥後內邪消去但手太陽之脈洪數此胃氣未服也今宜扶胃養脾為主勿亟亟於治痢痢亦自止白朮炭白蔻紫朴黃柏廣皮木香甘草茯苓神麯鍋巴建蓮澤瀉脈漸緩弱嗽減痛止胸脘亦寬平昔木旺土衰久患脾泄中氣大虧若飲食雜投諸症復增愈難調攝須慎之嗽橘紅一錢杏仁錢半枳殼一錢柴胡八分黃芩錢半花粉錢半知母一錢查炭三錢六曲錢半燈草三尺肝脈漸平胃脈反見滑大此皆飲食不調之故麥冬三錢元參一錢花粉錢半山梔仁錢半橘紅一錢杏仁一錢枳殼一錢查炭一錢燈心三尺服二帖去查肉加澤瀉徐商珍令媳左腰膝足腫流走疼痛麻木乾隆六年六脈遲弱兩尺尤甚左腰膝足腫關節間疼痛麻木遇溫暖即稍止此係三陰經之恙治宜溫腎養肝活絡為治當歸三錢川芎錢半肉桂五分秦艽二錢川熟附八分牛膝二錢獨活一錢南仲二錢川斷二錢桐皮二錢桑枝炒二錢左三部細弱右三部滑大此係病後失調肺未清胃為痰食所阻而畏飲食擬平淡藥幾味服之自能漸愈痧後通州老相公姓胡六脈弦數外見寒熱往來間日而作兩額巔頂微痛舌現黃苔飲食不貪小便通調大便艱澀此統屬少陽陽明兩經瘧症之象今治宜用小柴胡湯主之加入陽明之藥一二味服之兩劑再議損益可也瘧柴胡黃芩枳殼知母花粉甘草橘紅杏仁桔梗竹青燈心尊翁六脈弦數身熱如烙舌起黑苔中脘按之而痛大便自利小便赤色邪熱鬱伏值此高年屬在大險擬方服之一劑若能稍減即是生機時感石羔八錢川連一錢連翹三錢柴胡三錢葛根二錢黃芩二錢枳實二錢甘草五分知母二錢山梔三錢竹葉十片燈心三尺服之大效又六脈洪滑有力舌燥唇焦胸滿脹痛手不可按口渴無汗此陽明夾食之候法宜先用解肌後議清裡可也粉葛三錢石膏二錢豆豉二錢山梔錢半枳實二錢甘草三分薄荷一錢姜二片又初八日晚診得右寸關滑大肝部浮數腹痛雖平而肌表之熱未退主解肌清表乾葛三錢石羔三錢桔梗一錢甘草三分黃芩一錢蔞仁二錢澤瀉一錢丹皮一錢蘆根五分姜二片七元涇陶世揆九月吐酸嘔吐酸水連飲食俱出酸味覺刺心而痛繫好飲酒之人服四帖愈茯苓三錢桂枝木一錢澤瀉一錢黑山梔薑汁炒二錢橘紅二錢蒼朮錢半查肉二錢砂仁一錢甘草五分半夏二錢薑汁二匙鐵鏽水三匙三瘧之發由風邪痰飲伏於衛至深之處始以散邪為主若病久又必崇土為先兼和營衛脾土健營衛和其邪自不能留矣炒白朮錢半嫩黃耆一錢二分酒炒歸身一錢二分炒白芍一錢茯苓錢半川桂枝五分廣皮一錢半夏錢半炙草六分秦艽錢半大棗三枚老薑二片清晨河水煎服四劑後去桂枝又十劑戒力作忌發物鍾獄處陳老老左脅中痰氣結成痞塊按之汨汨有聲服之大效半夏薑汁炒三兩白朮土炒黃一兩上肉桂去皮不見火五錢炒山查二兩薑黃曬一兩炒白芥子一兩瓦楞子煅二兩醋炒青皮一兩廣皮括去白二兩炒茯苓二兩生木香五錢共製為末醋打神麯糊丸如緑豆大每服三錢薑湯送下學山公方案諱宗嶽字岱瞻王業侯令政傷寒治驗業侯令政素多鬱怒因産後嗽咳未除口乾喜飲至春夏之交忽惡寒壯熱身重頭疼其上則時欲飲水水入即吐下則氣痛泄瀉小水全無所服皆柴胡黃芩桔梗竹茹澤瀉豬苓等藥外熱似減諸症轉甚豫忝在相知為越俎而代庖焉診脈兩寸浮大關尺弦數且聞噯氣頻加並見上氣難忍不得不略陳一二以辨症定治大凡傷寒之來始太陽而絡厥陰在一經則有一經之症有一經之症必有一經之脈以符合之雖其錯綜變化自不可執要不外乎同中察異所謂有者求之無者求之是也故有時上病不必治上下病不必治下從乎中治有時上病而反治下下病而反治上運用存乎一心夫當頭痛治頭腳痛醫腳遂以畢神奇之用而稱大方家哉即今外顯惡寒發熱頭疼吐逆是太陽表症未解也喜飲湯水仍不能飲非熱邪之入里乃津液結聚於胸中也肺主氣水出高源故經曰膀胱者州都之官津液藏焉氣化則能出矣胸中為津液結聚兼以素多鬱怒遂使肺失其職不能通調水道下輸膀胱須開其水飲達陽和則上之口乾不治自愈而下之小便不利亦多矣因請立方遂以小青龍減麻黃細辛五味加茯苓前胡紫朴蘇梗廣皮一劑立效噯氣未除兩寸尚浮此氣逆上也再加益智香附服後向安但下午微寒寒過又熱至天明始退如是者二日此客病已去本病猶存因用調理脾胃兼養血分之品投之乃愈壬寅初夏桂枝白芍炮姜炙草半夏茯苓前胡紫朴蘇梗廣皮陸繩武令政産後發熱論治産後之症以補養氣血為先雖有他患以末治之所以內熱口乾者不得任用寒涼用寒涼則新血不生而胃陽受困頭疼惡寒者不可專行發散行發散則氣隨汗出而精神告匱前六七日時見脈勢澀弱飲食不入乳汁全無頻頻自汗以為平素體虛而産後過傷氣血用陽陰平調之劑從緩治也目今寒熱時發神氣不清脈來澀數而弱左關略旺大抵皆陽陰二氣自力乘侮非干外邪所致其神氣不清者一由於血室空虛留瘀得以隨熱勢而入一由於胃陽不固心神因以隨自汗而傷法宜生血以退熱養氣以安神開胃以加食乃能全愈也俞君愛令郎危症治驗今春三月中旬周莊俞君愛次子來述其兄病症危篤堅請一診至則見其面黧神瘁口噤自合脈來軟弱沉思半晌因詰之曰是病外無六經之邪內無五藏之患莫非負重遠行枵腹任勞乎何厥狀之困頓至於此極也其家人曰興工築岸半月來勿得休息繼又到貴鎮探視食生冷難化之物歸至中途嘔吐頻作胃中由是脹痛三月前服導滯丸大便行過數次然終飲食不思脹痛自若轉覺神氣憤亂今病危矣原先生有以救之乃恍然曰勞苦旬余過傷脾胃復食以難化之物其不能容而吐出也宜矣一吐則脾胃愈傷從前困倦之態始顯呈於外藥貴半養神而半和胃乃能奏效收功服下二劑果不爽言戈道士勞傷發熱咳嗽治驗戈道士年二十餘先患傷風咳嗽旬日後勉力負重發熱臥床於是口渴痰盛自汗脅疼兼下血水數次微利便黃前醫四劑不效加以氣短食減來延豫診豫見其面色浮紅三言三止早已知屬虛者半矣乃診之則弦數浮滑左大於右一似有餘者然然按之豁如且不耐久診久則手動作振動之勢告曰乃知內傷外感併發由下虛而上盛氣怯而神露也若純用下氣清熱等藥症將不起矣方用丹皮花粉桔梗桑葉橘紅薄荷甘草茯苓白芍加倍燈心為引一劑熱退二劑氣平再服二帖去花粉薄荷加麥冬苡仁遂獲愈陸久凝三公郎寒熱脹痛治驗泗港陸九文昆仲夙年相知也仲秋之月久凝三公郎忽寒熱頭疼從胸至腹脹悶不堪久文知醫先服解肌消導之劑不效來鎮相邀值豫在云亭曹氏乃請承調元往診用小柴胡加石羔頭疼雖止諸症轉甚加以噁心使者相望於道適又他出不得已延余弟宇瞻診視云是結胸主以瓜蔞山梔枳實竹茹黃芩等藥服後胸腹愈痛伊兄允升躬叩豫門同仲兒尋至慕義莊飛掉歸家薄暮始得抵彼病者聞聲欣然曰先生其救我乎蓋望之久矣豫因思結胸成於下早否則日久邪陷亦成今疾作而痛隨起定非結胸細按右脈弦中帶緊其間必有寒物阻住升降以寒涼治之所以脹痛日甚況是日陰雨兩旬天時之濕感召極速必平胃散加藿香腹皮蘇梗半夏柴胡烏藥始得破其壅塞忙服一劑下咽後噁心頓止覺腹有聲如雷頃刻脹痛若失遂能安臥無虞丙申仲秋存案蒼朮陳皮厚朴甘草藿香腹皮蘇梗半夏柴胡烏藥蔣天祥令郎傷寒危症治險蔣天祥令郎年十三今秋患傷寒更數醫調治有用麻黃髮汗者有用石羔瀉火者更有用牛黃大黃清心行滯者鮮獲一效後市醫以啓脾為主自謂妥當得法矣亦卒無成功比及四旬勢病轉劇將治後事乃延余診涕泣哀告請決行期之早晚非以望愈也余觀大肉已脫面赤唇紅時時乾咳午後發熱尤甚六脈浮數兩寸兼大知其精液被藥久傷肺金為火所爍是為陰虛陽盛之極不速治之必變成癆瘵雖勿即斃亦難望愈所喜者三部中無弦急不和之狀猶有生機遂慰其父曰是病雖重可以不死豫且勿優從前之藥悉屬誤治倘能堅信豫言數劑必獲全效方用門冬青蔥沙參秦艽白芍丹皮甘草薄荷桔梗桑皮橘紅一劑熱退再劑身涼咳猶未除去薄荷秦艽加五味九粒石斛一錢連進四服氣平咳止即思飲食是余獨有確見所以立方用藥得心應手因筆之以志一時之見云方裕遠政傷寒發痙將危治驗方裕遠政寒熱如瘧柳仁和以解肌清熱之法治之數劑後神昏口噤手足拘攣有蔡松濤者江寧人也近居吾鄉新與方結為秦晉迎歸調治見勢危急束手無策遂辭去於是遣使相招進診時力持其手乃可切脈觀松濤所定藥案議論似是用藥實非猶以一杯水救一車薪之火也安能起一生於九死哉即索筆紙立書數行大約謂風寒濕三氣雜合難解正虛邪盛以至此極當遵太陽剛痙法用桂枝天麻鉤鉤秦艽木瓜通其經絡茯神菖蒲半夏甘草丹皮開其心神頻頻灌下半日人事稍清三宿手足亦舒見胃虛神困加人參歸身平調四劑裕遠以為無事不復醫治半月後神呆氣滯語言恍惚就商於豫為用清心消痰之藥遂獲愈又傷寒後神呆氣滯語言恍惚論治裕老夫人秋間患傷寒瀕於死余為起之實未全愈也迄今神呆氣滯語言恍惚目不停瞬請約略言之以定主治之方經曰言者心之聲也又曰心藏神是故心氣實則神完氣固可以慮周萬事而應變無方可以答對如流而秩然有序傷寒之來津液先耗邪氣內陷昏憒纍日不語經旬知清陽之受困者深矣所以飲食如故形體如故而其神明之地久為餘邪所據生火生痰已非一日非有以抉去之則厚味之入適足以資盜糧非有以鎮固之則遊子之歸恐難期之歲月且經曰木屬肝肝能生風風主搖動目得血而能視由此觀之肝氣虛肝血亦虧矣今當養心補肝兼以消痰斯為合法沙甌瞻二媳時氣治驗乙卯二月甌瞻次媳繆氏女也繆無子止生此女性多躁久患三瘧春初歸探母病維持而調護之寒熱交作有程姓蒙師屬在比鄰亦稍知醫道服發散藥熱已漸退連食腐漿大棗等藥胸前遂覺脹悶熱又復作乃延余診因用和解清導一帖已自減可程不思彼體虛加入三稜蓬朮噯氣轉加吐痰不已酌方主和營衛兼清氣化痰寒熱乃止但汗出過多反覺惡寒脈細且所吐者皆清水而小便全無少腹腫滿余思脾氣又虛之人土不制水水泛為痰土不生金金難化氣惟納其氣以歸腎燥其脾以培元則水不患其無制金不患其失司遂以五苓散加益智半夏廣皮車前外用杉木皮煎湯薰洗病即全愈六娘娘胎前寒熱以致小産去血過多精困神昏語言不出寒熱仍來勢亦險矣勉擬於下小産後當歸三錢丹參二錢茯神錢半澤蘭一錢青蒿一錢炙草五分炮姜四分菖蒲三分浮麥三錢大效得病六七日轉覺頭疼壯熱咳逆煩渴診脈右滑大左弦急此係風熱鬱遏三陽當涼解為法風熱咳石羔杏仁甘草桑皮前胡麻黃薄荷橘紅宇瞻公方案徐云上令郎忽然吐瀉症吐瀉六脈微弱面青肢冷氣脫神疲中氣衰而脾陽欲脫已成慢脾風候擬參附理中一法人參六分附子三分廣皮八分藿香六分半夏八分茯苓錢半烏梅一枚炮姜三分陳米一撮服一帖去烏梅參附姜米茯苓減去五分加炙草三分白朮錢半益智仁五分三帖全愈産後脈澀而數形羸氣怯腹痛腰疼潮熱心悸將成蓐勞症非輕可宜建中湯黃耆雲苓白芍甘草桂枝棗仁丹參廣皮香附煨姜恆齊公方案公諱健字體乾常熟蕭宅女上則喉口糜爛下則腹痛便溏病由去秋延及今夏時作寒熱如瘧緣勞心體質夏氣失長秋冬收藏今至暑氣為之內伏今診脈左尺寸俱緊右關重按見澀面色赤黑晦滯舌苔膩厚黃白睹色切脈見症情形明明腎水鬱及丙火三焦失司宣化耳河間云膀胱移熱於小腸膈腸不便心胃壅熱上為口糜主以柴胡地骨散奈病久食減虧虛虛火易以升動用藥以此為棘手不獲已小其劑緩其制以進之柴胡去苗地骨皮二味等分為末水一盞煎至八分去滓食前服每服藥末或二三錢可也進三服大效門生戚孟揚室胎前痢龜板牛膝炮姜白芍炙草夏枯草麥冬沙參薄荷梗女人年二十四歲難産旬日不下請穩婆割下割傷內里大腸以致糞皆從小便出所喜飲食如故真黃絹如無以黃繭代之豬大腸二味煨熟吃豬大腸如此吃三日即愈矣治血痢細生地歸身山梔白芍知母牛膝薄荷炙草荷葉夏枯草瘀血不下用司天升明湯紫檀野薔薇根半夏棗仁青皮車前子生薑甘草加歸尾而下劉某口臭用地骨皮石決明牛膝冬桑葉等愈張某腫脹症用司天升明湯紫檀車前青皮半夏棗仁薔薇生薑炙草茅朮白朮檳榔厚朴防已生地澤瀉愈肝氣痛祕方制川附歸全焦白芍赤苓陳皮丹參遠志製半夏炙草內虛熱加川楝子彭元瑞小便不通姬妾多而服春藥之故案云少年誤服丹藥以致小便不通金汁蘆根湯沖服
